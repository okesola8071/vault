<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault – Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cyan: #00D4FF;
            --cyan-dim: rgba(0,212,255,0.1);
            --bg: #030508;
            --surface: #080D14;
            --surface2: #0D1520;
            --border: rgba(0,212,255,0.08);
            --border2: rgba(255,255,255,0.05);
            --text: #E8F4FF;
            --muted: #4A6080;
            --green: #00FF94;
            --red: #FF4D6A;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,212,255,0.04) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124,58,237,0.05) 0%, transparent 60%); pointer-events: none; z-index: 0; }
        body::after { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(0,212,255,0.06) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; z-index: 0; }
        .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }
        .brand { text-align: center; margin-bottom: 36px; }
        .brand-logo { width: 52px; height: 52px; border: 1px solid var(--cyan); border-radius: 16px; display: grid; place-items: center; background: var(--cyan-dim); font-size: 24px; box-shadow: 0 0 24px rgba(0,212,255,0.2); margin: 0 auto 14px; }
        .brand-name { font-weight: 700; font-size: 24px; color: var(--cyan); letter-spacing: 3px; }
        .brand-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 32px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.4; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); display: block; margin-bottom: 8px; }
        input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px; font-family: 'Space Grotesk', sans-serif; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 0 3px rgba(0,212,255,0.05); }
        input::placeholder { color: var(--muted); }
        .btn-primary { width: 100%; font-size: 14px; font-weight: 600; color: #000; background: var(--cyan); border: none; padding: 13px; border-radius: 10px; cursor: pointer; transition: all 0.2s; box-shadow: 0 0 20px rgba(0,212,255,0.25); margin-top: 8px; font-family: 'Space Grotesk', sans-serif; }
        .btn-primary:hover { background: #33DDFF; box-shadow: 0 0 28px rgba(0,212,255,0.4); transform: translateY(-1px); }
        .foot { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
        .foot a { color: var(--cyan); text-decoration: none; }
        .foot a:hover { text-decoration: underline; }
        .alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; font-size: 13px; }
        .alert-success { background: rgba(0,255,148,0.08); border: 1px solid rgba(0,255,148,0.2); color: var(--green); }
        .alert-danger { background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.2); color: var(--red); }
        .alert-warning { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--cyan); }
        .password-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-logo">🔒</div>
        <div class="brand-name">VAULT</div>
        <div class="brand-sub">Create your account.</div>
    </div>
    <div class="card">
        <div class="card-title">Get started</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="John Doe" minlength="2" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="08012345678" minlength="10" maxlength="15" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" minlength="8" required>
                <div class="password-hint">Minimum 8 characters</div>
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <div class="foot">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </div>
    </div>
</div>
</body>
</html>
